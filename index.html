<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMM 205 Exam B Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --orange-brand: #f09b1a;
      --ice-bg: #d9ecf7;
      --card-white: #f6f9fc;
      --amber-warn: #f4b942;
      --coral-mistake: #d96c6c;
      --green-correct: #4f9d69;
      --dark-text: #1a1a2e;
      --mid-text: #4a4a6a;
      --light-text: #7a7a9a;
      --code-bg: #1e1e2e;
      --code-text: #e0e0e0;
      --excel-green: #217346;
      --r-blue: #276dc3;
      --slide-bg: #f0f4f8;
      --shadow: 0 20px 50px rgba(26, 26, 46, 0.08);
      --shadow-soft: 0 8px 24px rgba(26, 26, 46, 0.08);
      --radius: 16px;
      --radius-sm: 10px;
      --transition: 300ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #eff5f9 0%, #e6f1f7 100%);
      color: var(--dark-text);
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    body {
      position: relative;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    button:focus-visible,
    input:focus-visible,
    select:focus-visible {
      outline: 3px solid rgba(240, 155, 26, 0.35);
      outline-offset: 2px;
    }

    code,
    pre,
    .mono {
      font-family: "JetBrains Mono", "SF Mono", "Consolas", "Liberation Mono", monospace;
    }

    #progress {
      position: fixed;
      inset: 0 auto auto 0;
      width: 0;
      height: 3px;
      background: var(--orange-brand);
      z-index: 60;
      transition: width 300ms ease;
    }

    #top-hint {
      position: fixed;
      top: 1rem;
      right: 1.2rem;
      z-index: 70;
      padding: 0.7rem 0.95rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(26, 26, 46, 0.08);
      box-shadow: var(--shadow-soft);
      color: var(--mid-text);
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
    }

    #deck {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      padding: 3.4rem 2.8rem 5.2rem;
      display: flex;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity var(--transition), transform var(--transition);
      background:
        radial-gradient(circle at top left, rgba(240, 155, 26, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(39, 109, 195, 0.08), transparent 32%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.65), rgba(255, 255, 255, 0.2));
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .slide::before {
      content: "";
      position: absolute;
      inset: 1.5rem;
      border: 1px solid rgba(26, 26, 46, 0.04);
      border-radius: 28px;
      pointer-events: none;
    }

    .slide-shell {
      width: min(1100px, 100%);
      height: auto;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1.2rem;
      position: relative;
      z-index: 1;
      transform-origin: center center;
      will-change: transform;
    }

    .slide-stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding-top: 0.25rem;
    }

    .hero-shell {
      align-content: center;
      text-align: center;
      gap: 1.8rem;
    }

    .hero-title {
      margin: 0;
      font-family: "Space Grotesk", "Inter", sans-serif;
      font-size: clamp(3rem, 6vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .hero-subtitle,
    .hero-meta {
      margin: 0 auto;
      max-width: 40rem;
      color: var(--mid-text);
      font-size: clamp(1.05rem, 1.8vw, 1.3rem);
      line-height: 1.6;
    }

    .hero-badge-row,
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }

    .badge {
      padding: 0.6rem 0.9rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(26, 26, 46, 0.08);
      box-shadow: var(--shadow-soft);
      font-size: 0.9rem;
      color: var(--mid-text);
    }

    .slide-header {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .section-label {
      font-family: "Space Grotesk", "Inter", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--section-color, var(--orange-brand));
    }

    .slide-title {
      margin: 0;
      font-family: "Space Grotesk", "Inter", sans-serif;
      font-size: clamp(2.1rem, 4vw, 3.2rem);
      line-height: 1.04;
      letter-spacing: -0.04em;
    }

    .slide-subtitle {
      margin: 0;
      color: var(--mid-text);
      font-size: 1.08rem;
      line-height: 1.6;
      max-width: 58rem;
    }

    .slide-body {
      min-height: 0;
      display: grid;
      gap: 1.2rem;
      align-content: start;
    }

    .card,
    .interactive-box,
    .table-box,
    .callout {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(26, 26, 46, 0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card {
      padding: 1.35rem 1.5rem;
    }

    .card h3,
    .card h4,
    .callout h3 {
      margin: 0 0 0.7rem;
      font-family: "Space Grotesk", "Inter", sans-serif;
      font-size: 1.15rem;
    }

    .card p,
    .card li,
    .callout p {
      margin: 0;
      color: var(--mid-text);
      line-height: 1.55;
      font-size: 1rem;
    }

    .card ul,
    .card ol {
      margin: 0;
      padding-left: 1.15rem;
      display: grid;
      gap: 0.55rem;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1rem;
    }

    .layout-intro .slide-body,
    .layout-concept .slide-body,
    .layout-compare .slide-body,
    .layout-interactive .slide-body,
    .layout-workflow .slide-body,
    .layout-warning .slide-body,
    .layout-activity .slide-body {
      grid-template-rows: auto 1fr auto;
    }

    .layout-intro .content-grid,
    .layout-concept .content-grid,
    .layout-compare .content-grid,
    .layout-warning .content-grid {
      display: grid;
      gap: 1rem;
    }

    .layout-intro .content-grid {
      grid-template-columns: 1.2fr 0.8fr;
    }

    .layout-concept .content-grid,
    .layout-compare .content-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .layout-workflow .content-grid {
      display: grid;
      gap: 0.9rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .layout-interactive .content-grid {
      display: grid;
      gap: 1rem;
      grid-template-rows: auto 1fr;
    }

    .layout-warning .content-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .callout-row {
      display: grid;
      gap: 0.8rem;
    }

    .callout {
      padding: 0.95rem 1.1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .callout-icon {
      font-size: 1.1rem;
      line-height: 1.2;
      margin-top: 0.05rem;
    }

    .callout.exam-tip {
      border-left: 6px solid var(--amber-warn);
    }

    .callout.mistake {
      border-left: 6px solid var(--coral-mistake);
    }

    .callout.takeaway {
      border-left: 6px solid var(--green-correct);
    }

    .code-block {
      margin: 0.8rem 0 0;
      padding: 1rem 1.1rem;
      background: var(--code-bg);
      color: var(--code-text);
      border-radius: 12px;
      overflow-x: auto;
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .inline-formula,
    .formula-chip {
      display: inline-block;
      background: rgba(26, 26, 46, 0.06);
      padding: 0.15rem 0.45rem;
      border-radius: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
      color: var(--dark-text);
    }

    .formula-banner {
      padding: 0.8rem 1rem;
      border-radius: 12px;
      background: rgba(33, 115, 70, 0.08);
      border: 1px solid rgba(33, 115, 70, 0.12);
      color: var(--dark-text);
      font-family: "JetBrains Mono", monospace;
      line-height: 1.5;
    }

    .truth-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0.8rem;
      font-size: 0.94rem;
    }

    .truth-table th,
    .truth-table td {
      padding: 0.55rem 0.6rem;
      border-bottom: 1px solid rgba(26, 26, 46, 0.08);
      text-align: left;
      color: var(--mid-text);
    }

    .truth-table th {
      color: var(--dark-text);
      font-weight: 600;
    }

    .roadmap-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
    }

    .roadmap-card {
      padding: 1.2rem;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
      border: 1px solid rgba(26, 26, 46, 0.06);
      text-align: left;
    }

    .roadmap-icon {
      font-size: 1.5rem;
      margin-bottom: 0.7rem;
      display: inline-block;
    }

    .roadmap-card h3 {
      margin: 0 0 0.5rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.08rem;
    }

    .roadmap-card p {
      margin: 0;
      color: var(--mid-text);
      line-height: 1.5;
      font-size: 0.96rem;
    }

    .hero-note {
      color: var(--light-text);
      font-size: 0.95rem;
    }

    .profile-card {
      display: grid;
      place-items: center;
      text-align: center;
      min-height: 100%;
      background:
        radial-gradient(circle at 30% 20%, rgba(240, 155, 26, 0.14), transparent 28%),
        linear-gradient(135deg, rgba(39, 109, 195, 0.08), rgba(33, 115, 70, 0.04));
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(240, 155, 26, 0.85), rgba(39, 109, 195, 0.75));
      display: grid;
      place-items: center;
      color: white;
      font-family: "Space Grotesk", sans-serif;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .interactive-box {
      border: 2px solid var(--orange-brand);
      padding: 1.3rem;
      background: white;
      min-height: 0;
      overflow: auto;
    }

    .interactive-instruction {
      color: var(--mid-text);
      font-size: 0.98rem;
      margin: 0;
    }

    .sim-grid {
      display: grid;
      gap: 0.9rem;
    }

    .sim-grid.cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .sim-controls {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    .control {
      display: grid;
      gap: 0.35rem;
    }

    .control label,
    .table-caption,
    .mini-label {
      color: var(--mid-text);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
    }

    .control input,
    .control select,
    .concat-part {
      width: 100%;
      border: 1px solid rgba(26, 26, 46, 0.16);
      border-radius: 8px;
      padding: 0.55rem 0.7rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 1rem;
      color: var(--dark-text);
      background: #fff;
    }

    .result-box {
      padding: 0.75rem 0.95rem;
      background: var(--code-bg);
      color: var(--green-correct);
      border-radius: 10px;
      font-family: "JetBrains Mono", monospace;
      font-size: 1.15rem;
      line-height: 1.45;
      min-height: 3rem;
      display: flex;
      align-items: center;
      overflow-x: auto;
    }

    .result-box.error {
      color: var(--coral-mistake);
    }

    .sim-explain {
      color: var(--mid-text);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .data-table,
    .mini-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.94rem;
      overflow: hidden;
    }

    .data-table th,
    .data-table td,
    .mini-table th,
    .mini-table td {
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid rgba(26, 26, 46, 0.08);
      text-align: left;
      color: var(--mid-text);
    }

    .data-table th,
    .mini-table th {
      color: var(--dark-text);
      background: rgba(217, 236, 247, 0.55);
      font-weight: 600;
    }

    .row-match {
      background: rgba(240, 155, 26, 0.12);
      box-shadow: inset 4px 0 0 var(--orange-brand);
    }

    .row-dim {
      opacity: 0.42;
    }

    .cell-return {
      background: rgba(79, 157, 105, 0.16);
      color: var(--green-correct);
      font-weight: 700;
      border-radius: 6px;
    }

    .array-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.55rem;
      margin-top: 0.5rem;
    }

    .array-cell {
      border-radius: 10px;
      padding: 0.65rem 0.6rem;
      background: rgba(217, 236, 247, 0.72);
      text-align: center;
      color: var(--mid-text);
      border: 1px solid rgba(26, 26, 46, 0.06);
      transition: background 200ms ease, transform 200ms ease, color 200ms ease;
    }

    .array-cell.active {
      background: rgba(240, 155, 26, 0.16);
      color: var(--dark-text);
      transform: translateY(-2px);
      box-shadow: inset 0 0 0 2px rgba(240, 155, 26, 0.45);
    }

    .array-pos {
      display: block;
      margin-top: 0.25rem;
      font-size: 0.78rem;
      color: var(--light-text);
    }

    .tab-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-bottom: 0.9rem;
    }

    .tab {
      padding: 0.55rem 0.85rem;
      border-radius: 999px;
      background: rgba(26, 26, 46, 0.06);
      color: var(--mid-text);
      transition: background 160ms ease, color 160ms ease;
    }

    .tab.active {
      background: var(--orange-brand);
      color: white;
    }

    .char-map {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }

    .char-cell {
      min-width: 44px;
      padding: 0.45rem 0.35rem;
      border-radius: 10px;
      text-align: center;
      background: var(--ice-bg);
      color: var(--mid-text);
      font-family: "JetBrains Mono", monospace;
      border: 1px solid rgba(26, 26, 46, 0.06);
    }

    .char-cell.active {
      background: var(--orange-brand);
      color: white;
    }

    .char-index {
      display: block;
      margin-top: 0.25rem;
      font-size: 0.72rem;
      opacity: 0.9;
    }

    mark {
      background: rgba(240, 155, 26, 0.3);
      padding: 0.08rem 0.12rem;
      border-radius: 4px;
    }

    .segment-output {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(26, 26, 46, 0.08);
    }

    .segment {
      padding: 0.65rem 0.75rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 1.05rem;
      color: var(--dark-text);
    }

    .spaces-view {
      padding: 0.75rem 0.95rem;
      border-radius: 10px;
      background: rgba(30, 30, 46, 0.04);
      font-family: "JetBrains Mono", monospace;
      line-height: 1.5;
      color: var(--mid-text);
      word-break: break-all;
    }

    .removed-space {
      color: var(--coral-mistake);
      font-weight: 700;
    }

    .compare-panels {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .compare-panel {
      border: 1px solid rgba(26, 26, 46, 0.08);
      border-radius: 14px;
      padding: 1rem;
      background: rgba(246, 249, 252, 0.75);
    }

    .difference-banner {
      padding: 0.85rem 1rem;
      background: rgba(240, 155, 26, 0.1);
      border-radius: 10px;
      border-left: 4px solid var(--orange-brand);
      color: var(--mid-text);
      font-size: 0.95rem;
    }

    .workflow-step {
      padding: 1rem 1rem 1.05rem;
      border-radius: 14px;
      border: 1px solid rgba(26, 26, 46, 0.08);
      background: rgba(255, 255, 255, 0.85);
      box-shadow: var(--shadow-soft);
      position: relative;
    }

    .step-number {
      position: absolute;
      top: 0.8rem;
      right: 0.8rem;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: var(--orange-brand);
      color: white;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .pipeline-code {
      margin-top: 0.75rem;
      padding: 0.8rem 0.9rem;
      background: var(--code-bg);
      color: var(--code-text);
      border-radius: 10px;
      font-size: 0.93rem;
      white-space: pre-wrap;
    }

    .warning-card {
      border-left: 6px solid var(--coral-mistake);
      background: rgba(217, 108, 108, 0.08);
    }

    .join-visual {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: start;
    }

    .join-arrow {
      align-self: center;
      font-size: 1.5rem;
      color: var(--orange-brand);
      font-weight: 700;
    }

    .footer-ui {
      position: fixed;
      inset: auto 0 1.2rem 0;
      z-index: 70;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .footer-bar {
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.55rem 0.8rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(26, 26, 46, 0.08);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
    }

    .keyboard-hint {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      color: var(--mid-text);
      font-size: 0.95rem;
    }

    .keycap {
      min-width: 34px;
      height: 34px;
      padding: 0 0.55rem;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(26, 26, 46, 0.06);
      color: var(--dark-text);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.95rem;
      box-shadow: inset 0 -1px 0 rgba(26, 26, 46, 0.08);
    }

    #slide-counter {
      position: fixed;
      right: 1.6rem;
      bottom: 1.5rem;
      z-index: 70;
      color: var(--light-text);
      font-size: 0.95rem;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(26, 26, 46, 0.08);
      box-shadow: var(--shadow-soft);
      border-radius: 999px;
      padding: 0.6rem 0.9rem;
      backdrop-filter: blur(10px);
    }

    #overview {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(15, 20, 28, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      backdrop-filter: blur(8px);
    }

    #overview.open {
      display: flex;
    }

    .overview-panel {
      width: min(1100px, 100%);
      max-height: 85vh;
      overflow: auto;
      padding: 1.5rem;
      border-radius: 22px;
      background: white;
      box-shadow: 0 28px 80px rgba(15, 20, 28, 0.24);
    }

    .overview-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .overview-header h2 {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 1.8rem;
    }

    .overview-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: 1fr;
    }

    .overview-group {
      display: grid;
      gap: 0.65rem;

      shell.style.transform = "scale(1)";
      const availableWidth = stage.clientWidth;
      const availableHeight = stage.clientHeight;
      const neededWidth = shell.scrollWidth;
      const neededHeight = shell.scrollHeight;
      const scale = Math.min(1, availableWidth / neededWidth, availableHeight / neededHeight);
      shell.style.transform = `scale(${scale})`;

    function compareValues(a, operator, b) {
      switch (operator) {
        case ">": return a > b;
        case ">=": return a >= b;
        case "<": return a < b;
        case "<=": return a <= b;
        case "=": return a === b;
        case "<>": return a !== b;
        default: return false;
      }
    }

    function makeTextFunctionSimulator(root) {
      const state = { text: "PROD-2024-XL", mode: "LEFT", chars: 4, start: 6 };
      function render() {
        let active = [];
        let result = "";
        if (state.mode === "LEFT") {
          active = Array.from({ length: Math.max(0, Number(state.chars) || 0) }, (_, index) => index).filter((index) => index < state.text.length);
          result = state.text.slice(0, Number(state.chars) || 0);
        } else if (state.mode === "RIGHT") {
          const count = Math.max(0, Number(state.chars) || 0);
          active = Array.from({ length: count }, (_, index) => state.text.length - count + index).filter((index) => index >= 0 && index < state.text.length);
          result = state.text.slice(state.text.length - count);
        } else {
          const start = Math.max(1, Number(state.start) || 1);
          const count = Math.max(0, Number(state.chars) || 0);
          active = Array.from({ length: count }, (_, index) => start - 1 + index).filter((index) => index < state.text.length);
          result = state.text.slice(start - 1, start - 1 + count);
        }
        root.innerHTML = `
          <div class="sim-grid">
            <div class="control"><label for="text-input">Input string</label><input id="text-input" value="${escapeHtml(state.text)}"></div>
            ${buildCharMap(state.text, active)}
            <div class="tab-row">
              ${["LEFT", "RIGHT", "MID"].map((mode) => `<button class="tab ${state.mode === mode ? "active" : ""}" data-mode="${mode}">${mode}</button>`).join("")}
            </div>
            <div class="sim-controls">
              ${state.mode === "MID" ? `
                <div class="control"><label for="mid-start">Start</label><input id="mid-start" type="number" min="1" value="${state.start}"></div>
                <div class="control"><label for="mid-count">Num chars</label><input id="mid-count" type="number" min="0" value="${state.chars}"></div>
              ` : `
                <div class="control"><label for="char-count">Num chars</label><input id="char-count" type="number" min="0" value="${state.chars}"></div>
              `}
            </div>
            <div class="formula-banner">${state.mode === "LEFT" ? `=LEFT("${state.text}", ${state.chars})` : state.mode === "RIGHT" ? `=RIGHT("${state.text}", ${state.chars})` : `=MID("${state.text}", ${state.start}, ${state.chars})`}</div>
            <div class="result-box">"${result}"</div>
          </div>
        `;
        root.querySelector("#text-input").addEventListener("input", (event) => {
          state.text = event.target.value;
          render();
        });
        root.querySelectorAll("[data-mode]").forEach((btn) => btn.addEventListener("click", () => {
          state.mode = btn.dataset.mode;
          render();
        }));
        const charCount = root.querySelector("#char-count");
        if (charCount) charCount.addEventListener("input", (event) => { state.chars = event.target.value; render(); });
        const midStart = root.querySelector("#mid-start");
        const midCount = root.querySelector("#mid-count");
        if (midStart) midStart.addEventListener("input", (event) => { state.start = event.target.value; render(); });
        if (midCount) midCount.addEventListener("input", (event) => { state.chars = event.target.value; render(); });
        scheduleFit();
      }
      render();
    }

    function makeConcatSimulator(root) {
      const state = { parts: ["Hello", " ", "World"] };
      const colors = ["#f7d28c", "#b6d8f2", "#c9e7ce", "#f5c0c0", "#ded3f6"];

      function render() {
        root.innerHTML = `
          <div class="sim-grid">
            <div class="sim-controls">
              ${state.parts.map((part, index) => `
                <div class="control">
                  <label for="concat-${index}">Part ${index + 1}</label>
                  <input class="concat-part" id="concat-${index}" data-part="${index}" value="${escapeHtml(part)}">
                </div>
              `).join("")}
            </div>
            <div><button class="tab" id="add-part" ${state.parts.length >= 5 ? "disabled" : ""}>+ Add part</button></div>
            <div class="formula-banner">=CONCATENATE(${state.parts.map((part) => `"${part.replaceAll('"', '\\"')}"`).join(", ")})</div>
            <div class="segment-output">
              ${state.parts.map((part, index) => `<div class="segment" style="background:${colors[index % colors.length]}">${escapeHtml(part || "∅")}</div>`).join("")}
            </div>
            <div class="result-box">${escapeHtml(state.parts.join(""))}</div>
          </div>
        `;
        root.querySelectorAll("[data-part]").forEach((input) => input.addEventListener("input", (event) => {
          state.parts[Number(event.target.dataset.part)] = event.target.value;
          render();
        }));
        root.querySelector("#add-part").addEventListener("click", () => {
          if (state.parts.length < 5) {
            state.parts.push("");
            render();
          }
        });
        scheduleFit();
      }
      render();
    }

    function makeLenTrimSimulator(root) {
      const state = { text: "   Hello   World   " };

      function render() {
        const before = state.text;
        const after = trimExcelStyle(before);
        const beforeLen = before.length;
        const afterLen = after.length;
        const removed = beforeLen - afterLen;
        root.innerHTML = `
          <div class="sim-grid">
            <div class="control"><label for="trim-input">Input</label><input id="trim-input" value="${escapeHtml(state.text)}"></div>
            <div class="compare-panels">
              <div class="compare-panel">
                <div class="mini-label">Before TRIM</div>
                <div class="spaces-view">${visibleSpaces(before)}</div>
                <p style="margin-top:0.7rem;"><span class="inline-formula">LEN = ${beforeLen}</span></p>
              </div>
              <div class="compare-panel">
                <div class="mini-label">After TRIM</div>
                <div class="spaces-view">${visibleSpaces(after)}</div>
                <p style="margin-top:0.7rem;"><span class="inline-formula">LEN = ${afterLen}</span></p>
              </div>
            </div>
            <div class="sim-explain">TRIM removed <strong>${removed}</strong> extra space character${removed === 1 ? "" : "s"}.</div>
          </div>
        `;
        root.querySelector("#trim-input").addEventListener("input", (event) => {
          state.text = event.target.value;
          render();
        });
        scheduleFit();
      }
      render();
    }

    function makeSubstituteReplaceSimulator(root) {
      const state = { text: "2024-01-15", oldText: "-", newText: "/", start: 5, count: 1 };

      function render() {
        const substituteResult = substituteAll(state.text, state.oldText, state.newText);
        const start = Math.max(1, Number(state.start) || 1);
        const count = Math.max(0, Number(state.count) || 0);
        const replaceResult = state.text.slice(0, start - 1) + state.newText + state.text.slice(start - 1 + count);
        const subMarked = state.oldText ? escapeHtml(state.text).replaceAll(escapeHtml(state.oldText), `<mark>${escapeHtml(state.oldText)}</mark>`) : escapeHtml(state.text);
        const replaceMarked = state.text.split("").map((ch, index) => {
          const active = index >= start - 1 && index < start - 1 + count;
          return active ? `<mark>${escapeHtml(ch)}</mark>` : escapeHtml(ch);
        }).join("");

        root.innerHTML = `
          <div class="sim-grid">
            <div class="sim-controls">
              <div class="control"><label for="shared-text">Text</label><input id="shared-text" value="${escapeHtml(state.text)}"></div>
              <div class="control"><label for="sub-old">Old</label><input id="sub-old" value="${escapeHtml(state.oldText)}"></div>
              <div class="control"><label for="shared-new">New</label><input id="shared-new" value="${escapeHtml(state.newText)}"></div>
              <div class="control"><label for="replace-start">Start</label><input id="replace-start" type="number" min="1" value="${state.start}"></div>
              <div class="control"><label for="replace-count">Num</label><input id="replace-count" type="number" min="0" value="${state.count}"></div>
            </div>
            <div class="compare-panels">
              <div class="compare-panel">
                <h3>SUBSTITUTE</h3>
                <p>Replaces by content.</p>
                <div class="spaces-view">${subMarked}</div>
                <div class="formula-banner" style="margin-top:0.8rem;">=SUBSTITUTE("${state.text}", "${state.oldText}", "${state.newText}")</div>
                <div class="result-box" style="margin-top:0.8rem;">${escapeHtml(substituteResult)}</div>
              </div>
              <div class="compare-panel">
                <h3>REPLACE</h3>
                <p>Replaces by position.</p>
                <div class="spaces-view">${replaceMarked}</div>
                <div class="formula-banner" style="margin-top:0.8rem;">=REPLACE("${state.text}", ${start}, ${count}, "${state.newText}")</div>
                <div class="result-box" style="margin-top:0.8rem;">${escapeHtml(replaceResult)}</div>
              </div>
            </div>
            <div class="difference-banner">Key difference: SUBSTITUTE finds matching content and replaces every match. REPLACE targets a specific position range.</div>
          </div>
        `;

        [["#shared-text", "text"], ["#sub-old", "oldText"], ["#shared-new", "newText"], ["#replace-start", "start"], ["#replace-count", "count"]].forEach(([selector, key]) => {
          root.querySelector(selector).addEventListener("input", (event) => {
            state[key] = event.target.value;
            render();
          });
        });
        scheduleFit();
      }
      render();
    }

    function makeFindSearchSimulator(root) {
      const state = { text: "Hello World", needle: "world" };

      function render() {
        const haystack = state.text;
        const needle = state.needle;
        const findIndex = haystack.indexOf(needle);
        const searchIndex = haystack.toLowerCase().indexOf(needle.toLowerCase());
        const active = searchIndex >= 0 ? Array.from({ length: needle.length }, (_, index) => searchIndex + index) : [];
        root.innerHTML = `
          <div class="sim-grid">
            <div class="sim-controls">
              <div class="control"><label for="find-text">Text</label><input id="find-text" value="${escapeHtml(state.text)}"></div>
              <div class="control"><label for="find-needle">Find me</label><input id="find-needle" value="${escapeHtml(state.needle)}"></div>
            </div>
            <div class="compare-panels">
              <div class="compare-panel">
                <h3>FIND</h3>
                <p>Case-sensitive</p>
                <div class="result-box ${findIndex === -1 ? "error" : ""}" style="margin-top:0.8rem;">${findIndex === -1 ? "ERROR" : findIndex + 1}</div>
                <p style="margin-top:0.75rem;">${findIndex === -1 ? `"${needle}" does not exactly match the case in "${haystack}".` : `Match starts at position ${findIndex + 1}.`}</p>
              </div>
              <div class="compare-panel">
                <h3>SEARCH</h3>
                <p>Case-insensitive</p>
                <div class="result-box ${searchIndex === -1 ? "error" : ""}" style="margin-top:0.8rem;">${searchIndex === -1 ? "ERROR" : searchIndex + 1}</div>
                <p style="margin-top:0.75rem;">${searchIndex === -1 ? `No match found for "${needle}".` : `SEARCH matches "${haystack.slice(searchIndex, searchIndex + needle.length)}" starting at position ${searchIndex + 1}.`}</p>
              </div>
            </div>
            ${buildCharMap(haystack, active)}
          </div>
        `;
        root.querySelector("#find-text").addEventListener("input", (event) => {
          state.text = event.target.value;
          render();
        });
        root.querySelector("#find-needle").addEventListener("input", (event) => {
          state.needle = event.target.value;
          render();
        });
        scheduleFit();
      }
      render();
    }

    function initSimulators() {
      const map = {
        "if-simulator": makeIfSimulator,
        "countifs-simulator": (root) => makeCountifsSimulator(root, "countifs"),
        "sumifs-simulator": (root) => makeCountifsSimulator(root, "sumifs"),
        "vlookup-simulator": makeVlookupSimulator,
        "index-match-simulator": (root) => renderIndexMatch(root, "combo"),
        "text-function-simulator": makeTextFunctionSimulator,
        "concat-simulator": makeConcatSimulator,
        "len-trim-simulator": makeLenTrimSimulator,
        "substitute-replace-simulator": makeSubstituteReplaceSimulator,
        "find-search-simulator": makeFindSearchSimulator
      };

      document.querySelectorAll("[data-sim]").forEach((box) => {
        const id = box.dataset.sim;
        const root = box.querySelector(".sim-root");
        map[id](root);
      });
    }

    function syncIndexMatchTabs() {
      const slide = slideEls[current];
      const defaultTab = slide.dataset.defaultTab;
      if (!defaultTab) return;
      slide.querySelectorAll('[data-sim="index-match-simulator"] .sim-root').forEach((root) => {
        root._indexState = root._indexState || { lookup: "Ops", row: 2, tab: defaultTab };
        root._indexState.tab = defaultTab;
        renderIndexMatch(root, defaultTab);
      });
    }

    initSimulators();
    window.addEventListener("resize", scheduleFit);
    showSlide(0);
    scheduleFit();
  </script>
</body>

</html>
